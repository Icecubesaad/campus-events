<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Local Tourism</title>
    <link rel="stylesheet" href="../styles/style.css">
</head>
<body>

    <header>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="destination.html">Destinations</a></li>
                <li><a href="packages.html">Packages</a></li>
                <li><a href="gallery.html">Gallery</a></li>
                <li><a href="contact.html" class="active">Contact Us</a></li>
            </ul>
        </nav>
    </header>

    <main class="container">
        <h1>Contact Us</h1>
        <p>Hamare sath rabta karein ya mazeed maloomat ke liye niche diya gaya form bharein.</p>

        <section class="contact-form">
            <form id="tour-contact-form">
                <div class="form-group">
                    <label for="name">Name:</label>
                    <input type="text" id="name" name="name" placeholder="Apna naam likhein" required>
                </div>

                <div class="form-group">
                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email" placeholder="Apna email likhein" required>
                </div>

                <div class="form-group">
                    <label for="message">Message:</label>
                    <textarea id="message" name="message" rows="5" placeholder="Apna paigham likhein" required></textarea>
                </div>

                <button type="submit" class="btn-submit">Send Message</button>
            </form>
        </section>

        <section class="social-links">
            <h3>Follow Us</h3>
            <div class="links">
                <a href="https://facebook.com" target="_blank">Facebook</a> |
                <a href="https://instagram.com" target="_blank">Instagram</a> |
                <a href="https://twitter.com" target="_blank">Twitter</a>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Local Tourism Promotion Team. All rights reserved.</p>
    </footer>

</body>
</html>
